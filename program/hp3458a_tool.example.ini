# HP 3458A NVRAM Tool — példa konfigurációs fájl
# Másold hp3458a_tool.ini névre és töltsd ki a saját értékeiddel.
# A program első csatlakozáskor automatikusan létrehozza és frissíti ezt a fájlt.

# Felhasználói felület nyelve: hu / en / de
lang=hu

# TCP mód (Prologix GPIB-ETHERNET bridge)
host=192.168.2.88
port=1234

# NI-488.2 közvetlen mód
board=0

# GPIB cím (0–30, HP 3458A gyári alapértéke: 22)
gpib=22

# Kapcsolat típusa: tcp / ni
conn_type=tcp
